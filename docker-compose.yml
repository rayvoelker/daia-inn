services:
  ollama:
    image: ollama/ollama
    profiles: ["full"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  inn:
    build: .
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - INN_PORT=3001
      - MEMINFO_PATH=/host/meminfo
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [utility]
    volumes:
      - /proc/meminfo:/host/meminfo:ro
    restart: unless-stopped

volumes:
  ollama_data:
